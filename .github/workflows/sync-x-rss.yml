name: Sync X RSS Investigations

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build RSS digest
        run: node scripts/syncTwitterRss.mjs

      - name: Commit changes
        run: |
          if git diff --quiet public/data/rss_twitter.json; then
            echo "No RSS changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/rss_twitter.json
          git commit -m "content: sync x rss investigations [bot]"
          git push
