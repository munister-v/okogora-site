name: Sync Facebook RSS Investigations

on:
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Facebook RSS digest
        run: node scripts/syncFacebookRss.mjs

      - name: Commit changes
        run: |
          if git diff --quiet public/data/rss_facebook.json; then
            echo "No Facebook RSS changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/rss_facebook.json
          git commit -m "content: sync facebook rss investigations [bot]"
          git pull --rebase origin main
          git push
