name: Sync Brigades Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '23 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build brigades dashboard
        run: node scripts/syncBrigadesDashboard.mjs

      - name: Commit changes
        run: |
          if git diff --quiet public/data/brigades_dashboard.json; then
            echo "No brigades dashboard changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/brigades_dashboard.json
          git commit -m "content: sync brigades dashboard [bot]"
          git pull --rebase origin main
          git push
