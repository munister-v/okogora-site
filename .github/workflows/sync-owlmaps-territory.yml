name: Sync Owlmaps Territory GeoJSON

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Convert KMZ to GeoJSON
        run: node scripts/syncOwlmapsTerritory.mjs

      - name: Commit changes
        run: |
          if git diff --quiet public/data/territory_geojson.json; then
            echo "No territory changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/territory_geojson.json
          git commit -m "content: sync owlmaps territory GeoJSON [bot]"
          git pull --rebase origin main
          git push
