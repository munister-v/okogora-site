name: Sync Strategic Maps

on:
  workflow_dispatch:
  schedule:
    - cron: '41 4 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build strategic overlay dataset
        run: node scripts/syncStrategicMaps.mjs

      - name: Commit changes
        run: |
          if git diff --quiet public/data/strategic_targets.json; then
            echo "No strategic map changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/strategic_targets.json
          git commit -m "content: sync strategic map overlays [bot]"
          git pull --rebase origin main
          git push
