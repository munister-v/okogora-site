name: Sync Pechalbeda Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '13 2 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Pechalbeda stats
        run: node scripts/syncPechalbedaStats.mjs

      - name: Commit changes
        run: |
          if git diff --quiet public/data/pechalbeda_stats.json; then
            echo "No pechalbeda stats changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/pechalbeda_stats.json
          git commit -m "content: sync pechalbeda stats [bot]"
          git pull --rebase origin main
          git push
