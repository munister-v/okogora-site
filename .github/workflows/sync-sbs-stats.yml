name: Sync SBS Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '11 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install sqlite3
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Build SBS snapshot
        run: node scripts/syncSbsStats.mjs

      - name: Commit changes
        run: |
          if git diff --quiet public/data/sbs_stats_snapshot.json; then
            echo "No SBS changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/sbs_stats_snapshot.json
          git commit -m "content: sync sbs stats [bot]"
          git pull --rebase origin main
          git push
