name: Sync DeepState Table

on:
  workflow_dispatch:
  schedule:
    - cron: '23 */2 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build DeepState snapshot
        run: node scripts/syncDeepstateTable.mjs

      - name: Commit changes
        run: |
          if git diff --quiet public/data/deepstate_table.json; then
            echo "No DeepState changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/deepstate_table.json
          git commit -m "content: sync deepstate table [bot]"
          git pull --rebase origin main
          git push
