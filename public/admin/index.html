<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ОКО ГОРА — Admin Redirect</title>
  <meta http-equiv="refresh" content="0; url=/#/admin" />
  <script>
    (function () {
      var target = '/#/admin';
      if (window.location.search) target += window.location.search;
      if (window.location.hash && window.location.hash !== '#') target += window.location.hash;
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Переадресація до адмінки…</p>
</body>
</html>
